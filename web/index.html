<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Трек системного программиста</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
</head>
<body>
<div class="layout">
  <nav class="sidebar">
    <div class="sidebar-header">
      <h1 id="course-title">Трек системного программиста</h1>
      <div class="progress-line" id="progress-line">0 / 0 модулей</div>
      <div class="progress-bar"><div class="progress-bar-fill" id="progress-fill"></div></div>
    </div>
    <div id="sidebar-stages"></div>
  </nav>

  <main class="main" id="main">
    <div class="module-toolbar" id="module-toolbar" style="display:none">
      <div class="crumbs" id="crumbs"></div>
      <div class="module-tabs" id="module-tabs"></div>
      <button class="mark-done" id="mark-done-btn">Отметить пройденным</button>
    </div>

    <!-- Четыре панели: лекция, квиз, практика, ментор -->
    <div id="panel-lecture" class="tab-panel panel-hidden"></div>
    <div id="panel-quiz"    class="tab-panel panel-hidden"></div>
    <div id="panel-practice" class="tab-panel panel-hidden"></div>
    <div id="panel-mentor"  class="tab-panel panel-hidden"></div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="quiz.js"></script>
<script src="editor.js"></script>
<script src="ai-chat.js"></script>
<script src="app.js"></script>
</body>
</html>
